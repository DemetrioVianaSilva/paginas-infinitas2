    <script>
        tailwind.config = {
            darkMode: 'class',

                extend: {
                    animation: {
                        'fade-in': 'fadeIn 0.3s ease-in-out',
                        'slide-up': 'slideUp 0.3s ease-out',
                        'scale-in': 'scaleIn 0.2s ease-out'
                    },
                    keyframes: {
                        fadeIn: {
                            '0%': { opacity: '0' },
                            '100%': { opacity: '1' }
                        },
                        slideUp: {
                            '0%': { transform: 'translateY(20px)', opacity: '0' },
                            '100%': { transform: 'translateY(0)', opacity: '1' }
                        },
                        scaleIn: {
                            '0%': { transform: 'scale(0.95)', opacity: '0' },
                            '100%': { transform: 'scale(1)', opacity: '1' }
                        }
                    }
                }

    <style>
        * {
            -webkit-tap-highlight-color: transparent;
        }
        body {
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        .line-clamp-2 {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .line-clamp-3 {
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .glass-effect {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }
        .glass-effect-dark {
            background: rgba(31, 41, 55, 0.9);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }
        .card-hover {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .card-hover:hover {
            transform: translateY(-8px) scale(1.02);
        }
        @media (max-width: 640px) {
            .card-hover:hover {
                transform: translateY(-4px);
            }
            button {
                min-height: 44px;
            }
        }
        .btn-hover {
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
        }
        .btn-hover::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }
        .btn-hover:hover::before {
            width: 300px;
            height: 300px;
        }
        .modal-enter {
            animation: fade-in 0.3s ease-out;
        }
        .gradient-bg {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .gradient-text {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .category-scroll {
            overflow-x: auto;
            overflow-y: hidden;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        .category-scroll::-webkit-scrollbar {
            display: none;
        }
        
        /* 🆕 Modal responsivo para mobile */
        @media (max-width: 640px) {
            .modal-content-mobile {
                max-height: 85vh;
                overflow-y: auto;
                -webkit-overflow-scrolling: touch;
            }
        }
    </style>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { getDatabase, ref, set, get, onValue } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js';

        // 🔥 FIREBASE CONFIG
        const firebaseConfig = {
            apiKey: "AIzaSyA_H8pc2WB4J8t6FscluO2VEQIzf5f94UY",
            authDomain: "paginas-infinitas.firebaseapp.com",
            databaseURL: "https://paginas-infinitas-default-rtdb.firebaseio.com",
            projectId: "paginas-infinitas",
            storageBucket: "paginas-infinitas.firebasestorage.app",
            messagingSenderId: "143200715075",
            appId: "1:143200715075:web:732cf446d3ec945096aff6"
        };

        let app, database, isFirebaseReady = false;
        
        // Inicializar Firebase
        try {
            app = initializeApp(firebaseConfig);
            database = getDatabase(app);
            isFirebaseReady = true;
            console.log('🔥 Firebase conectado!');
        } catch (error) {
            console.error('❌ Erro Firebase:', error);
            alert('Erro ao conectar Firebase. Usando localStorage apenas.');
        }

        // 📚 VARIÁVEIS GLOBAIS
        window.ADMIN_PASS = 'user195705';
        window.isAdmin = false;
        window.viewMode = 'grid';
        window.selectedCategory = 'all';
        window.editingId = null;
        window.books = [];
        window.categories = ['Ficção', 'Não-Ficção', 'Técnico', 'Biografia', 'Romance'];

        // 📥 CARREGAR DADOS
        window.loadData = async function() {
            console.log('📥 Carregando dados...');
            try {
                if (isFirebaseReady) {
                    const booksRef = ref(database, 'books');
                    const catsRef = ref(database, 'categories');
                    
                    const [booksSnap, catsSnap] = await Promise.all([
                        get(booksRef),
                        get(catsRef)
                    ]);
                    
                    if (booksSnap.exists()) {
                        const data = booksSnap.val();
                        window.books = Array.isArray(data) ? data.filter(Boolean) : Object.values(data || {});
                        console.log('✅ Livros carregados:', window.books.length);
                    }
                    
                    if (catsSnap.exists()) {
                        window.categories = catsSnap.val();
                    }
                } else {
                    const saved = localStorage.getItem('books');
                    if (saved) window.books = JSON.parse(saved);
                }
            } catch (error) {
                console.error('Erro ao carregar:', error);
            }
            
            renderBooks();
            renderCategories();
        };

        // 💾 SALVAR DADOS
        window.saveData = async function() {
            console.log('💾 Salvando...');
            try {
                if (isFirebaseReady) {
                    await Promise.all([
                        set(ref(database, 'books'), window.books),
                        set(ref(database, 'categories'), window.categories)
                    ]);
                    console.log('✅ Salvo no Firebase!');
                } else {
                    localStorage.setItem('books', JSON.stringify(window.books));
                }
            } catch (error) {
                console.error('Erro ao salvar:', error);
                if (error.code === 'PERMISSION_DENIED') {
                    alert('🚨 PERMISSÃO NEGADA!\n\nAs regras do Firebase expiraram.\n\nVá em Firebase Console → Realtime Database → Regras\ne atualize conforme a documentação.');
                }
            }
        };

        // 🔄 LISTENER TEMPO REAL
        if (isFirebaseReady) {
            onValue(ref(database, 'books'), (snapshot) => {
                if (snapshot.exists()) {
                    const data = snapshot.val();
                    const newBooks = Array.isArray(data) ? data.filter(Boolean) : Object.values(data || {});
                    if (JSON.stringify(newBooks) !== JSON.stringify(window.books)) {
                        console.log('🔄 Atualização em tempo real!');
                        window.books = newBooks;
                        renderBooks();
                    }
                }
            });
            
            onValue(ref(database, 'categories'), (snapshot) => {
                if (snapshot.exists()) {
                    window.categories = snapshot.val();
                    renderCategories();
                }
            });
        }

        window.toggleDarkMode = function() {
            document.documentElement.classList.toggle('dark');
            localStorage.setItem('darkMode', document.documentElement.classList.contains('dark'));
        };

        if (localStorage.getItem('darkMode') === 'true') {
            document.documentElement.classList.add('dark');
        }

        window.toggleAdmin = function() {
            if (window.isAdmin) {
                window.isAdmin = false;
                document.getElementById('adminBtnText').textContent = 'Admin';
                document.getElementById('adminControls').classList.add('hidden');
                renderBooks();
            } else {
                document.getElementById('adminModal').classList.remove('hidden');
            }
        };

        window.loginAdmin = async function() {
            const pass = document.getElementById('adminPassword').value;
            const encoder = new TextEncoder();
            const data = encoder.encode(pass);
            const hashBuffer = await crypto.subtle.digest('SHA-256', data);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
            
            if (hashHex === '9d493195601b65ec63ea7486cd6b723f7601983e0240a72535138fa274f437d6') {
                window.isAdmin = true;
                document.getElementById('adminBtnText').textContent = 'Sair';
                document.getElementById('adminModal').classList.add('hidden');
                document.getElementById('adminPassword').value = '';
                document.getElementById('adminControls').classList.remove('hidden');
                renderBooks();
            } else {
                alert('Senha incorreta!');
            }
        };

        window.setViewMode = function(mode) {
            window.viewMode = mode;
            const isDark = document.documentElement.classList.contains('dark');
            document.getElementById('gridBtn').className = mode === 'grid' 
                ? `p-2 sm:p-3 rounded-xl bg-blue-100 text-blue-600 ${isDark ? 'dark:bg-blue-900 dark:text-blue-300' : ''} transition-all duration-200 shadow-md hover:shadow-lg`
                : `p-2 sm:p-3 rounded-xl bg-gray-200 text-gray-600 ${isDark ? 'dark:bg-gray-700 dark:text-gray-300' : ''} transition-all duration-200 shadow-md hover:shadow-lg`;
            document.getElementById('listBtn').className = mode === 'list' 
                ? `p-2 sm:p-3 rounded-xl bg-blue-100 text-blue-600 ${isDark ? 'dark:bg-blue-900 dark:text-blue-300' : ''} transition-all duration-200 shadow-md hover:shadow-lg`
                : `p-2 sm:p-3 rounded-xl bg-gray-200 text-gray-600 ${isDark ? 'dark:bg-gray-700 dark:text-gray-300' : ''} transition-all duration-200 shadow-md hover:shadow-lg`;
            renderBooks();
        };

        function renderCategories() {
            const container = document.getElementById('categoryFilters');
            const isDark = document.documentElement.classList.contains('dark');
            
            // 🆕 Usando flex-shrink-0 para evitar quebra de botões
            container.innerHTML = `
                <button onclick="filterByCategory('all')" class="flex-shrink-0 ${window.selectedCategory === 'all' ? 'bg-gradient-to-r from-blue-500 to-purple-600 text-white shadow-lg' : `bg-white text-gray-700 hover:bg-gray-50 ${isDark ? 'dark:bg-gray-700 dark:text-gray-300 dark:hover:bg-gray-600' : ''}`} px-4 sm:px-5 py-2 sm:py-2.5 rounded-full transition-all duration-200 text-sm sm:text-base font-medium shadow-md hover:shadow-lg whitespace-nowrap">
                    Todos
                </button>
            `;
            window.categories.forEach(cat => {
                container.innerHTML += `
                    <button onclick="filterByCategory('${cat}')" class="flex-shrink-0 ${window.selectedCategory === cat ? 'bg-gradient-to-r from-blue-500 to-purple-600 text-white shadow-lg' : `bg-white text-gray-700 hover:bg-gray-50 ${isDark ? 'dark:bg-gray-700 dark:text-gray-300 dark:hover:bg-gray-600' : ''}`} px-4 sm:px-5 py-2 sm:py-2.5 rounded-full transition-all duration-200 text-sm sm:text-base font-medium shadow-md hover:shadow-lg whitespace-nowrap">
                        ${cat}
                    </button>
                `;
            });

            const select = document.getElementById('bookCategory');
            select.innerHTML = '<option value="">Selecione uma categoria</option>';
            window.categories.forEach(cat => {
                select.innerHTML += `<option value="${cat}">${cat}</option>`;
            });
        }

        window.filterByCategory = function(cat) {
            window.selectedCategory = cat;
            renderCategories();
            filterBooks();
        };

        window.openCategoryModal = function() {
            renderCategoriesList();
            document.getElementById('categoryModal').classList.remove('hidden');
        };

        window.closeCategoryModal = function() {
            document.getElementById('categoryModal').classList.add('hidden');
        };

        function renderCategoriesList() {
            const container = document.getElementById('categoriesList');
            const isDark = document.documentElement.classList.contains('dark');
            
            if (window.categories.length === 0) {
                container.innerHTML = '<p class="text-center text-gray-500 dark:text-gray-400 py-4">Nenhuma categoria criada ainda</p>';
                return;
            }
            
            container.innerHTML = window.categories.map((cat, index) => `
                <div class="flex items-center justify-between p-4 bg-gradient-to-r from-gray-50 to-gray-100 ${isDark ? 'dark:from-gray-700 dark:to-gray-600' : ''} rounded-xl shadow-sm hover:shadow-md transition-all duration-200">
                    <span class="text-gray-900 ${isDark ? 'dark:text-white' : ''} font-medium">${cat}</span>
                    <button onclick="deleteCategory(${index}, '${cat.replace(/'/g, "\\'")}')" class="p-2 text-red-600 hover:bg-red-100 ${isDark ? 'dark:hover:bg-red-900/30' : ''} rounded-lg transition-all duration-200">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path>
                        </svg>
                    </button>
                </div>
            `).join('');
        }

        window.addCategory = async function() {
            const input = document.getElementById('newCategory');
            const cat = input.value.trim();
            if (!cat) {
                alert('Digite um nome para a categoria!');
                return;
            }
            if (window.categories.includes(cat)) {
                alert('Esta categoria já existe!');
                return;
            }
            window.categories.push(cat);
            await window.saveData();
            renderCategoriesList();
            renderCategories();
            input.value = '';
        };

        window.deleteCategory = async function(index, catName) {
            if (!confirm(`Excluir categoria "${catName}"?`)) return;
            
            window.categories.splice(index, 1);
            window.books = window.books.map(book => {
                if (book.category === catName) {
                    return {...book, category: ''};
                }
                return book;
            });
            
            if (window.selectedCategory === catName) {
                window.selectedCategory = 'all';
            }
            
            await window.saveData();
            renderCategoriesList();
            renderCategories();
            renderBooks();
        };

        window.filterBooks = function() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const filtered = window.books.filter(book => {
                const matchesCategory = window.selectedCategory === 'all' || book.category === window.selectedCategory;
                const matchesSearch = !search || 
                    book.title.toLowerCase().includes(search) ||
                    book.author.toLowerCase().includes(search) ||
                    (book.description && book.description.toLowerCase().includes(search));
                return matchesCategory && matchesSearch;
            });
            renderBooks(filtered);
        };

        function renderBooks(booksToShow = null) {
            const filtered = booksToShow || window.books.filter(b => window.selectedCategory === 'all' || b.category === window.selectedCategory);
            const container = document.getElementById('booksList');
            const isDark = document.documentElement.classList.contains('dark');
            
            if (filtered.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-20 animate-fade-in">
                        <div class="w-20 h-20 bg-gradient-to-br from-blue-100 to-purple-100 ${isDark ? 'dark:from-gray-700 dark:to-gray-600' : ''} rounded-2xl flex items-center justify-center mx-auto mb-6 shadow-lg">
                            <svg class="w-10 h-10 text-blue-500 ${isDark ? 'dark:text-blue-400' : ''}" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path>
                            </svg>
                        </div>
                        <p class="text-gray-500 ${isDark ? 'dark:text-gray-400' : ''} text-xl font-medium">Nenhum livro encontrado</p>
                    </div>
                `;
                return;
            }

            container.className = window.viewMode === 'grid' 
                ? 'grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6'
                : 'space-y-6';
            
            container.innerHTML = filtered.map((book, index) => `
                <div onclick="showDetail(${book.id})" style="animation-delay: ${index * 0.05}s" class="animate-fade-in bg-white ${isDark ? 'dark:bg-gray-800' : ''} rounded-2xl shadow-lg hover:shadow-2xl transition-all duration-300 overflow-hidden cursor-pointer card-hover ${window.viewMode === 'list' ? 'flex gap-4 p-4' : ''}">
                    ${book.image ? `
                        <div class="relative ${window.viewMode === 'list' ? 'w-24 sm:w-32 h-32 sm:h-40 flex-shrink-0' : 'w-full h-64 sm:h-72'}">
                            <img src="${book.image}" alt="${book.title}" crossorigin="anonymous" loading="lazy"
                                class="w-full h-full object-cover">
                        </div>
                    ` : `
                        <div class="${window.viewMode === 'list' ? 'w-24 sm:w-32 h-32 sm:h-40' : 'w-full h-64 sm:h-72'} bg-gradient-to-br from-blue-100 to-purple-100 ${isDark ? 'dark:from-gray-700 dark:to-gray-600' : ''} flex items-center justify-center">
                            <svg class="w-16 h-16 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path>
                            </svg>
                        </div>
                    `}
                    <div class="${window.viewMode === 'grid' ? 'p-5' : 'flex-1 min-w-0'}">
                        <h3 class="font-bold text-lg sm:text-xl text-gray-900 ${isDark ? 'dark:text-white' : ''} mb-2 line-clamp-2">${book.title}</h3>
                        <p class="text-sm text-gray-600 ${isDark ? 'dark:text-gray-400' : ''} mb-3 font-medium">${book.author}</p>
                        ${book.description ? `<p class="text-sm text-gray-500 ${isDark ? 'dark:text-gray-500' : ''} mb-4 line-clamp-3">${book.description}</p>` : ''}
                        ${book.category ? `<span class="inline-block px-3 py-1 bg-gradient-to-r from-blue-100 to-purple-100 ${isDark ? 'dark:from-blue-900/30 dark:to-purple-900/30' : ''} text-blue-700 ${isDark ? 'dark:text-blue-300' : ''} text-xs font-semibold rounded-full mb-4">${book.category}</span>` : ''}
                        ${book.price ? `<p class="text-2xl font-bold bg-gradient-to-r from-green-600 to-emerald-600 bg-clip-text text-transparent mb-4">R$ ${book.price}</p>` : ''}
                        <div class="flex gap-2" onclick="event.stopPropagation()">
                            <a href="${book.affiliateLink}" target="_blank" rel="noopener noreferrer"
                                class="flex-1 bg-gradient-to-r from-orange-500 to-orange-600 text-white text-center py-2.5 px-4 rounded-xl hover:shadow-xl transition-all duration-200 font-medium shadow-md">
                                Comprar na Amazon
                            </a>
                            ${window.isAdmin ? `
                                <button onclick="editBook(${book.id})" class="p-2.5 bg-blue-100 ${isDark ? 'dark:bg-blue-900/30' : ''} text-blue-600 rounded-xl hover:bg-blue-200 transition-all duration-200 shadow-md">
                                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path>
                                    </svg>
                                </button>
                                <button onclick="deleteBook(${book.id})" class="p-2.5 bg-red-100 ${isDark ? 'dark:bg-red-900/30' : ''} text-red-600 rounded-xl hover:bg-red-200 transition-all duration-200 shadow-md">
                                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path>
                                    </svg>
                                </button>
                            ` : ''}
                        </div>
                    </div>
                </div>
            `).join('');
        }

        window.openBookModal = function() {
            window.editingId = null;
            document.getElementById('bookModalTitle').textContent = 'Adicionar Livro';
            document.getElementById('bookTitle').value = '';
            document.getElementById('bookAuthor').value = '';
            document.getElementById('bookDescription').value = '';
            document.getElementById('bookPrice').value = '';
            document.getElementById('bookImage').value = '';
            document.getElementById('bookCategory').value = '';
            document.getElementById('bookLink').value = '';
            document.getElementById('bookModal').classList.remove('hidden');
        };

        window.closeBookModal = function() {
            document.getElementById('bookModal').classList.add('hidden');
        };

        window.editBook = function(id) {
            const book = window.books.find(b => b.id === id);
            if (!book) return;
            
            window.editingId = id;
            document.getElementById('bookModalTitle').textContent = 'Editar Livro';
            document.getElementById('bookTitle').value = book.title;
            document.getElementById('bookAuthor').value = book.author;
            document.getElementById('bookDescription').value = book.description || '';
            document.getElementById('bookPrice').value = book.price || '';
            document.getElementById('bookImage').value = book.image || '';
            document.getElementById('bookCategory').value = book.category || '';
            document.getElementById('bookLink').value = book.affiliateLink;
            document.getElementById('bookModal').classList.remove('hidden');
        };

        window.saveBook = async function() {
            const title = document.getElementById('bookTitle').value.trim();
            const author = document.getElementById('bookAuthor').value.trim();
            let link = document.getElementById('bookLink').value.trim();
            
            if (!title || !author || !link) {
                alert('Preencha título, autor e link!');
                return;
            }

            if (!link.startsWith('http://') && !link.startsWith('https://')) {
                link = 'https://' + link;
            }

            const book = {
                id: window.editingId || Date.now(),
                title,
                author,
                description: document.getElementById('bookDescription').value.trim(),
                price: document.getElementById('bookPrice').value.trim(),
                image: document.getElementById('bookImage').value.trim(),
                category: document.getElementById('bookCategory').value,
                affiliateLink: link
            };

            if (window.editingId) {
                window.books = window.books.map(b => b.id === window.editingId ? book : b);
            } else {
                window.books.push(book);
            }

            await window.saveData();
            window.closeBookModal();
            renderBooks();
        };

        window.deleteBook = async function(id) {
            if (confirm('Excluir este livro?')) {
                window.books = window.books.filter(b => b.id !== id);
                await window.saveData();
                renderBooks();
            }
        };

        // 🆕 FUNÇÃO SHOWDETAIL MELHORADA PARA MOBILE
        window.showDetail = function(id) {
            const book = window.books.find(b => b.id === id);
            if (!book) return;
            
            const isDark = document.documentElement.classList.contains('dark');
            document.getElementById('detailContent').innerHTML = `
                <div class="flex justify-between items-start mb-6 sticky top-0 bg-white dark:bg-gray-800 pb-4 border-b border-gray-200 dark:border-gray-700 z-10">
                    <h2 class="text-xl sm:text-2xl md:text-3xl font-bold gradient-text pr-4 line-clamp-2">${book.title}</h2>
                    <button onclick="closeDetail()" class="text-gray-600 ${isDark ? 'dark:text-gray-400' : ''} hover:text-gray-800 text-3xl leading-none flex-shrink-0 transition-colors">×</button>
                </div>
                
                <div class="space-y-4">
                    ${book.image ? `
                        <div class="w-full max-h-64 sm:max-h-96 flex justify-center bg-gradient-to-br from-blue-50 to-purple-50 ${isDark ? 'dark:from-gray-700 dark:to-gray-600' : ''} rounded-2xl p-4 sm:p-6 shadow-inner">
                            <img src="${book.image}" alt="${book.title}" crossorigin="anonymous" class="max-w-full max-h-64 sm:max-h-96 object-contain rounded-xl shadow-lg">
                        </div>
                    ` : ''}
                    
                    <p class="text-base sm:text-lg text-gray-700 ${isDark ? 'dark:text-gray-300' : ''}"><strong>Autor:</strong> ${book.author}</p>
                    
                    ${book.category ? `<span class="inline-block px-4 py-2 bg-gradient-to-r from-blue-100 to-purple-100 text-blue-700 text-sm font-semibold rounded-full">${book.category}</span>` : ''}
                    
                    ${book.description ? `
                        <div>
                            <h3 class="font-bold text-lg sm:text-xl text-gray-900 ${isDark ? 'dark:text-white' : ''} mb-3">Descrição</h3>
                            <p class="text-sm sm:text-base text-gray-700 ${isDark ? 'dark:text-gray-300' : ''} whitespace-pre-line leading-relaxed">${book.description}</p>
                        </div>
                    ` : ''}
                    
                    ${book.price ? `<p class="text-2xl sm:text-3xl font-bold bg-gradient-to-r from-green-600 to-emerald-600 bg-clip-text text-transparent">R$ ${book.price}</p>` : ''}
                    
                    <div class="sticky bottom-0 bg-white dark:bg-gray-800 pt-4 border-t border-gray-200 dark:border-gray-700 mt-6">
                        <a href="${book.affiliateLink}" target="_blank" rel="noopener noreferrer"
                            class="block w-full bg-gradient-to-r from-orange-500 to-orange-600 text-white text-center py-3 sm:py-4 px-4 rounded-xl hover:shadow-2xl transition-all duration-200 font-bold text-base sm:text-lg shadow-lg">
                            Comprar na Amazon
                        </a>
                    </div>
                </div>
            `;
            document.getElementById('detailModal').classList.remove('hidden');
        };

        window.closeDetail = function() {
            document.getElementById('detailModal').classList.add('hidden');
        };

        // 🚀 INICIALIZAR
        window.loadData().then(() => {
            if (window.books.length === 0) {
                window.books = [{
                    id: Date.now(),
                    title: "Exemplo: A Arte da Guerra",
                    author: "Sun Tzu",
                    description: "✨ FIREBASE ATIVO!\nSincronização automática entre dispositivos.\n\nLogin admin: user195705",
                    price: "29.90",
                    image: "https://m.media-amazon.com/images/I/61h7Y-shOZL._SL1303_.jpg",
                    category: "Não-Ficção",
                    affiliateLink: "https://amazon.com.br"
                }];
                window.saveData();
                renderBooks();
            }
        });
    </script>
</body>
</html>
